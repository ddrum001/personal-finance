services:
  - type: web
    name: personal-finance-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Neon Postgres — paste your full postgresql:// connection string
      - key: DATABASE_URL
        sync: false

      # Auth / session
      - key: SESSION_SECRET
        sync: false
      - key: ALLOWED_EMAILS
        sync: false

      # CORS / frontend
      - key: ALLOWED_ORIGINS
        sync: false        # e.g. https://your-frontend.vercel.app
      - key: FRONTEND_URL
        sync: false

      # Plaid
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox    # change to development/production when ready
      - key: PLAID_REDIRECT_URI
        sync: false       # update to https://<your-render-url>.onrender.com/...

      # Google / Gmail OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false       # update to https://<your-render-url>.onrender.com/api/gmail/callback

      # Cookies — must be true on HTTPS (Render always serves HTTPS)
      - key: COOKIE_SECURE
        value: "true"
